<!-- V3.6 Knockout Bracket Section -->
<section id="knockout" class="section">
  <div class="section-title">
    <span>Road to Glory</span>
    <h2>Knockout Bracket</h2>
    <p>Round of 32 through to the Final. Group winners and runners-up can be filled once the groups finish.</p>
  </div>

  <div class="bracket-panel">
    <div class="bracket-round">
      <h3>Round of 32</h3>
      <div id="bracket-r32" class="bracket-list"></div>
    </div>

    <div class="bracket-round">
      <h3>Round of 16</h3>
      <div id="bracket-r16" class="bracket-list"></div>
    </div>

    <div class="bracket-round">
      <h3>Quarter-finals</h3>
      <div id="bracket-qf" class="bracket-list"></div>
    </div>

    <div class="bracket-round">
      <h3>Semi-finals</h3>
      <div id="bracket-sf" class="bracket-list"></div>
    </div>

    <div class="bracket-round final-round">
      <h3>Final</h3>
      <div id="bracket-final" class="bracket-list"></div>
      <div class="winner-card">
        <span>Projected Champion</span>
        <strong id="projectedChampion">Awaiting knockout results</strong>
      </div>
    </div>
  </div>
</section>
